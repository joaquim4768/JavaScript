<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        input[type = "number"]{
            display: block;
            margin-bottom: 20px;
            border-radius: 5px;
            border-color:blueviolet;
        }

        input[type = "button"]{
            border-radius: 5px;
        }
        div#res{
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
            color:rgb(146, 3, 149);
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.293);
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="n1" id="n1" placeholder="Digite um número">
    <input type="number" name="n2" id="n2" placeholder ="Digite outro número">

    <input type="button" value="Somar" onclick="somar()" id="botaoS">
    
    <div id="res">
        Resultado
    </div>
    <script>
        var botao = window.document.querySelector('input#botaoS');

        botao.addEventListener('click', somar);

        function somar(){
            var tn1 = window.document.getElementById('n1');
            var tn2 = window.document.getElementById('n2');
            var res = window.document.querySelector('div#res');

            var n1 = Number(tn1.value);
            var n2 = Number(tn2.value);

            var soma = n1 + n2;

            res.textContent = `A soma entre ${n1} e ${n2} é igual a: ${soma}`;
        }
    </script>
</body>
</html>
